name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out tag
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./.qoder-plugin/plugin.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "package.json version $package_version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if [[ "$manifest_version" != "$tag_version" ]]; then
            echo ".qoder-plugin/plugin.json version $manifest_version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if ! grep -Fq "const PLUGIN_VERSION = \"$tag_version\";" src/qoder-hook-wrapper.js; then
            echo "src/qoder-hook-wrapper.js version does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Check JavaScript
        run: npm run check

      - name: Build release assets
        run: npm run build:release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/qoder-otel-plugin.tar.gz \
            dist/qoder-otel-plugin.tar.gz.sha256 \
            dist/qoder-otel-plugin-v*.tar.gz \
            dist/qoder-otel-plugin-v*.tar.gz.sha256 \
            dist/install.sh \
            dist/install.ps1 \
            dist/install-release.ps1 \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
